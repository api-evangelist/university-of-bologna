  - date: '2026-06-03'
    rating: 3
    summary: >-
      The University of Bologna has a modest but genuine public API footprint built on
      open standards rather than a branded developer program. Verified live: the
      dati.unibo.it CKAN portal returns a valid CKAN Action API JSON response
      (success:true, ~33 datasets), and the AMS Acta EPrints repository returns a valid
      OAI-PMH 2.0 Identify response. An official GitHub org (github.com/unibo) and a
      LinkedIn school page were confirmed. No unified API developer portal, signup
      flow, course/SIS API, or status page was found; administrative and identity
      systems are gated behind institutional credentials. No endpoints were fabricated.
